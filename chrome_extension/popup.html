<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Verdana, sans-serif;
        font-size: 13px;
        padding: 12px;
        width: 280px;
        color: #333;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #555;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 5px 7px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 3px;
        margin-bottom: 10px;
      }
      button {
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
        background: #f60;
        color: white;
        border: none;
        border-radius: 3px;
      }
      button:hover { background: #e55; }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #090;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <label for="baseUri">API base URL</label>
    <input id="baseUri" type="text" placeholder="http://localhost:3001" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
